server {
    listen 80;

    # Serve the React SPA — unknown paths fall back to index.html for client-side routing
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/v1/... → backend:8080/api/v1/... — keep the /api prefix intact
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check proxied so Docker healthcheck can reach it via the frontend port too
    location /health {
        proxy_pass http://backend:8080/health;
    }
}
